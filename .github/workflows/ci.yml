name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_DIR: SpringEventBookingPlatform
  WAR_NAME: SpringEventBookingPlatform.war

jobs:
  build:
    name: Build WAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile
        working-directory: ${{ env.PROJECT_DIR }}
        run: mvn --batch-mode compile

      - name: Package WAR
        working-directory: ${{ env.PROJECT_DIR }}
        run: mvn --batch-mode package -DskipTests

      - name: Prepare artifact
        run: |
          mkdir -p build-artifact
          cp "${PROJECT_DIR}/target/"*.war "build-artifact/${WAR_NAME}"

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-event-booking-platform-war
          path: build-artifact/${{ env.WAR_NAME }}
          retention-days: 14


