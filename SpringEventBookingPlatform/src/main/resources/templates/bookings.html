<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Danh sách đơn đặt vé</title>
    <th:block th:replace="base :: css"></th:block>
</head>
<body>
    <div th:replace="base :: header"></div>

    <section class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0 text-truncate" style="max-width: 40%;">
                Đơn đặt vé: <span class="text-primary" th:text="${event.title}"></span>
            </h2>

            <div>
                <form th:action="@{''}" method="GET" class="d-flex gap-2 justify-content-end align-items-center">

                    <select name="statusId" class="form-select" style="width: auto;">
                        <option value="2,3,4" th:selected="${param.statusId == null or param.statusId[0] == '2,3,4'}">--Tất cả--</option>
                        <option value="2" th:selected="${param.statusId != null and param.statusId[0] == '2'}">Đã thanh toán</option>
                        <option value="3" th:selected="${param.statusId != null and param.statusId[0] == '3'}">Chờ hoàn tiền</option>
                        <option value="4" th:selected="${param.statusId != null and param.statusId[0] == '4'}">Đã hoàn tiền</option>
                    </select>

                    <input type="text" name="kw" class="form-control" style="width: 250px;" placeholder="Tìm tên người đặt..." th:value="${param.kw}">

                    <button type="submit" class="btn btn-outline-secondary text-nowrap">Tìm</button>

                    <a th:if="${(param.kw != null and param.kw[0] != '') or (param.statusId != null and param.statusId[0] != '3,4')}" 
                       th:href="@{''(statusId='3,4')}" class="btn btn-danger text-nowrap">Xóa lọc</a>

                    <a th:href="@{/admin/finance/pending-refund}" class="btn btn-secondary text-nowrap">Quay lại</a>
                </form>
            </div>
        </div>

        <div th:if="${bookings == null or #lists.isEmpty(bookings)}" class="alert alert-info text-center mt-4">
            Không tìm thấy đơn đặt vé nào phù hợp.
        </div>

        <table th:if="${bookings != null and !#lists.isEmpty(bookings)}" class="table table-hover table-bordered align-middle bg-white shadow-sm">
            <thead class="table-dark text-center">
                <tr>
                    <th>Mã đơn</th>
                    <th>Người đặt</th>
                    <th>Ngày đặt</th>
                    <th>Số lượng</th>
                    <th>Tổng tiền</th>
                    <th>Trạng thái</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="b : ${bookings}">
                    <td class="text-center fw-bold" th:text="${b.id}"></td>
                    <td th:text="${b.email}"></td>
                    <td class="text-center" th:text="${b.createdDate != null ? #dates.format(b.createdDate, 'dd/MM/yyyy HH:mm') : ''}"></td>
                    <td class="text-center fw-bold"><span th:text="${b.quantity}"></span> vé</td>
                    <td class="text-end text-primary fw-bold" 
                        th:text="${b.totalPrice != null ? #numbers.formatDecimal(b.totalPrice, 0, 'COMMA', 0, 'POINT') + ' đ' : '0 đ'}">
                    </td>
                    <td class="text-center">
                        <span th:if="${b.statusId == 2}" class="badge bg-success shadow-sm">Đã thanh toán</span>
                        <span th:if="${b.statusId == 3}" class="badge bg-warning text-dark shadow-sm">Chờ hoàn tiền</span>
                        <span th:if="${b.statusId == 4}" class="badge bg-info text-dark shadow-sm">Đã hoàn tiền</span>
                    </td>
                </tr>
            </tbody>
        </table>

        <nav th:if="${totalPages != null and totalPages > 1}" aria-label="Page navigation" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link" th:href="@{''(page=${currentPage - 1}, kw=${param.kw}, statusId=${param.statusId})}">Trước</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i} ? 'active'">
                    <a class="page-link" th:href="@{''(page=${i}, kw=${param.kw}, statusId=${param.statusId})}" th:text="${i}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{''(page=${currentPage + 1}, kw=${param.kw}, statusId=${param.statusId})}">Sau</a>
                </li>
            </ul>
        </nav>
    </section>

    <div th:replace="base :: footer"></div>
</body>
</html>
