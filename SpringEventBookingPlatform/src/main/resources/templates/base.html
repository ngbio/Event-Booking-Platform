<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head>
        <title>eCommerce Admin</title>
        <th:block th:fragment="css">
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
            <style>
                /* Màu Navy chuyên nghiệp cho Navbar */
                .bg-admin { background-color: #2c3e50 !important; }
                .nav-link.active { border-bottom: 2px solid #ffc107; color: #fff !important; }
            </style>
        </th:block>
    </head>
    <body>
        <header th:fragment="header">
            <nav class="navbar navbar-expand-sm navbar-dark bg-admin shadow-sm">
                <div class="container-fluid">
                    <a class="navbar-brand fw-bold" th:href="@{/admin/}">eCommerce's Admin</a>

                    <div class="collapse navbar-collapse" id="collapsibleNavbar" sec:authorize="isAuthenticated()">
                        <ul class="navbar-nav me-auto">
                            <li class="nav-item">
                                <a class="nav-link" th:classappend="${activePage == 'dashboard' ? 'active fw-bold' : ''}" 
                                   th:href="@{/admin/}">Thống kê</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:classappend="${activePage == 'users' ? 'active fw-bold' : ''}" 
                                   th:href="@{/admin/users}">Quản lý người dùng</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:classappend="${activePage == 'categories' ? 'active fw-bold' : ''}" 
                                   th:href="@{/admin/categories}">Quản lý danh mục</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:classappend="${activePage == 'events' ? 'active fw-bold' : ''}" 
                                   th:href="@{/admin/events}">Quản lý sự kiện</a>
                            </li>
                        </ul>

                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item d-flex align-items-center">
                                <a class="btn btn-outline-danger btn-sm" th:href="@{/logout}">Đăng xuất</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <footer th:fragment="footer">
            <div class="container mt-5">
                <div class="alert alert-secondary text-center small">Hệ thống quản lý sự kiện &copy; 2026</div>
            </div>
        </footer>
    </body>
</html>
