<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng nhập</title>
    <th:block th:replace="base :: css"></th:block>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">eCommerce's Admin</span>
        </div>
    </nav>

    <section class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4 fw-bold">LOGIN</h2>

                        <div th:if="${param.error}" class="alert alert-danger">
                            Email hoặc mật khẩu không đúng, hoặc tài khoản không có quyền admin.
                        </div>

                        <form method="post" th:action="@{/admin/login}">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control form-control-lg" name="email" placeholder="Nhập email admin..." required />
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Mật khẩu</label>
                                <input type="password" class="form-control form-control-lg" name="password" placeholder="Nhập mật khẩu..." required />
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success btn-lg shadow-sm">Đăng nhập</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div th:replace="base :: footer"></div>
</body>
</html>
