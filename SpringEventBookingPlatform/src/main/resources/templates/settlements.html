<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sự Kiện Cần Quyết Toán</title>
    <th:block th:replace="base :: css"></th:block>
</head>
<body class="bg-light">
    <div th:replace="base :: header"></div>

    <section class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Danh sách sự kiện cần quyết toán</h2>
        </div>

        <div th:if="${errMsg != null}" class="alert alert-danger alert-dismissible fade show shadow-sm">
            <strong>Lỗi!</strong> <span th:text="${errMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${successMsg != null}" class="alert alert-success alert-dismissible fade show shadow-sm">
            <strong>Thành công!</strong> <span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${events == null or #lists.isEmpty(events)}" class="alert alert-info text-center mt-4 shadow-sm p-5 border">
            <h5 class="mt-3 text-secondary">Hoàn tất</h5>
            <p class="text-muted mb-0">Tất cả các sự kiện đã được quyết toán. Hiện không có công nợ nào tồn đọng.</p>
        </div>

        <table th:if="${events != null and !#lists.isEmpty(events)}" class="table table-hover table-bordered align-middle bg-white shadow-sm mt-3">
            <thead class="table-dark text-center">
                <tr>
                    <th>Sự kiện</th>
                    <th>Nhà tổ chức</th>
                    <th>Ngày kết thúc</th>
                    <th>Doanh thu</th>
                    <th>Phí sàn</th>
                    <th>Cần chuyển khoản</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="e : ${events}">
                    <td>
                        <span th:text="${e.title}" class="fw-bold text-primary"></span>
                        <br/>
                        <small class="text-muted fw-bold" th:text="${e.soldTickets + ' vé đã bán'}"></small>
                    </td>
                    <td>
                        <strong th:text="${e.organizerName}"></strong><br/>
                        <small class="text-muted" th:text="${e.email}"></small> |
                        <small class="text-muted" th:text="${e.phone}"></small>
                    </td>
                    <td class="text-center" th:text="${#dates.format(e.endTime, 'dd/MM/yyyy')}"></td>
                    <td class="text-end text-dark fw-bold" th:text="${#numbers.formatDecimal(e.totalRevenue, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
                    <td class="text-end text-danger fw-bold" th:text="${'- ' + #numbers.formatDecimal(e.listingFee, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
                    <td class="text-end text-success fw-bold" th:text="${#numbers.formatDecimal(e.actualPayout, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
                    
                    <td class="text-center">
                        <div class="dropdown">
                            <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                Thao tác
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end shadow">
                                <li>
                                    <a class="dropdown-item py-2" th:href="@{/admin/finance/events/{id}/bookings(id=${e.id}, statusId='2,3,4')}">
                                        <i class="bi bi-list-check me-2"></i>DS đơn đặt vé
                                    </a>
                                </li>
                                <li><hr class="dropdown-divider"></li>
                                <li>
                                    <button type="button" class="dropdown-item text-success py-2 fw-bold" data-bs-toggle="modal" th:data-bs-target="'#settlementModal-' + ${e.id}">
                                        <i class="bi bi-check-circle me-2"></i>Duyệt quyết toán
                                    </button>
                                </li>
                            </ul>
                        </div>

                        <div class="modal fade text-start" th:id="'settlementModal-' + ${e.id}" tabindex="-1">
                            <div class="modal-dialog modal-dialog-centered">
                                <div class="modal-content border-0 shadow">
                                    <div class="modal-header bg-success text-white">
                                        <h5 class="modal-title fw-bold">Xác nhận chuyển khoản</h5>
                                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                                    </div>
                                    <form th:action="@{/admin/finance/process-settlement}" method="POST">
                                        <div class="modal-body">
                                            <input type="hidden" name="id" th:value="${e.id}" />
                                            <div class="alert alert-info">
                                                Cần chuyển: <strong class="fs-5 text-danger" th:text="${#numbers.formatDecimal(e.actualPayout, 0, 'COMMA', 0, 'POINT') + ' đ'}"></strong> 
                                                cho <strong>[[${e.organizerName}]]</strong>.
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label fw-bold">Mã giao dịch ngân hàng <span class="text-danger">*</span></label>
                                                <input type="text" name="settlementCode" class="form-control" placeholder="VD: FT260502111" required />
                                            </div>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                                            <button type="submit" class="btn btn-success fw-bold">Xác nhận đã chuyển</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>

    <div th:replace="base :: footer"></div>
</body>
</html>
