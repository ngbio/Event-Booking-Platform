<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản lý Thanh toán & Đối soát</title>
    <th:block th:replace="base :: css"></th:block>
</head>
<body>
    <div th:replace="base :: header"></div>

    <section class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Sự kiện chờ Thanh toán (Settlements)</h2>
        </div>

        <div th:if="${errMsg != null}" class="alert alert-danger alert-dismissible fade show shadow-sm">
            <span th:text="${errMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${successMsg != null}" class="alert alert-success alert-dismissible fade show shadow-sm">
            <span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${events == null or #lists.isEmpty(events)}" class="alert alert-light text-center mt-4 shadow-sm p-5 border">
            <h5 class="mt-3 text-secondary">Chưa có dữ liệu</h5>
            <p class="text-muted mb-0">Không có sự kiện hoàn thành nào đang chờ quyết toán.</p>
        </div>

        <table th:if="${events != null and !#lists.isEmpty(events)}" class="table table-hover table-bordered align-middle bg-white shadow-sm mt-3">
            <thead class="table-dark text-center">
                <tr>
                    <th>Tên sự kiện</th>
                    <th>Nhà tổ chức</th>
                    <th>Số vé bán ra</th>
                    <th>Tổng doanh thu</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="e : ${events}">
                    <td class="fw-bold">
                        <a th:href="@{/admin/finance/events/{id}/bookings(id=${e.id})}" th:text="${e.title}" class="text-decoration-none text-success"></a>
                    </td>
                    <td th:text="${e.organizerId != null ? e.organizerId.organizationName : 'N/A'}"></td>
                    <td class="text-center fw-bold"><span th:text="${e.soldTickets}">0</span> vé</td>
                    <td class="text-end text-success fw-bold" th:text="${e.price != null ? #numbers.formatDecimal(e.price * e.soldTickets, 0, 'COMMA', 0, 'POINT') + ' đ' : '0 đ'}"></td>
                    <td class="text-center">
                        <form th:action="@{/admin/finance/process-settlement}" method="post" class="m-0">
                            <input type="hidden" name="id" th:value="${e.id}"/>
                            <button type="submit" class="btn btn-sm btn-success fw-bold shadow-sm" onclick="return confirm('Xác nhận đã chuyển tiền quyết toán cho Nhà tổ chức này?')">
                                Duyệt thanh toán
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>

    <div th:replace="base :: footer"></div>
</body>
</html>
